services:
  db:
    image: mariadb:latest
    container_name: taphoa2hand-db
    networks:
      - taphoa-net
    environment:
      MARIADB_ROOT_PASSWORD: 123456
      MARIADB_DATABASE: taphoa2hand
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:latest
    container_name: taphoa2hand-redis
    networks:
      - taphoa-net
    ports:
      - "6379:6379"
  backend:
    build: .
    image: taphoa2hand:0.0.1
    container_name: taphoa2hand-be
    networks:
      - taphoa-net
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=taphoa2hand-db
      - DB_PORT=3306
      - REDIS_HOST=taphoa2hand-redis
    depends_on:
      db:
        condition: service_healthy

networks:
  taphoa-net: